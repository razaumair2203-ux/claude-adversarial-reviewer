name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stress test PowerShell runner
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tests\stress.ps1

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shell syntax
        run: |
          bash -n skills/claude-adversarial-reviewer/scripts/invoke-claude-review.sh
          bash -n skills/claude-adversarial-reviewer/scripts/snapshot.sh
          bash -n scripts/install.sh
          bash -n tests/stress.sh
      - name: Stress test POSIX runner
        run: |
          chmod +x tests/mock/claude-output tests/mock/claude-sleep tests/mock/claude-error
          bash tests/stress.sh
